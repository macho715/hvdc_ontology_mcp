name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check server.py hvdc_ops/ scripts/ --output-format=github

      - name: Check Python syntax (compile)
        run: |
          python -m compileall server.py hvdc_ops/ scripts/ -q

      - name: Run validation suite (quick)
        run: |
          python scripts/validate.py --quick
        timeout-minutes: 5

name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install root dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Install excel-mcp dependencies
        run: python -m pip install -r excel-mcp/requirements.txt
      - name: Run validation suite
        run: python scripts/validate.py

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install root dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Excel launcher smoke
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\start-excel-mcp.ps1 -InstallDeps -SmokeTest
